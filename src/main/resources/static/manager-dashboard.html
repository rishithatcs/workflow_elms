<!DOCTYPE html>
<html>
<head>
    <title>Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container-fluid">
            <span class="navbar-brand">Manager Dashboard</span>
            <span class="text-white" id="userName"></span>
            <button class="btn btn-sm btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </nav>
    <div class="container mt-4">
        <div class="card">
            <div class="card-header">
                <h5>Pending Leave Requests</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Type</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Duration</th>
                            <th>Reason</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="leaveTableBody"></tbody>
                </table>
            </div>
        </div>
        <div class="card mt-4">
            <div class="card-header">
                <h5>All Leave Requests</h5>
            </div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Type</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Comments</th>
                        </tr>
                    </thead>
                    <tbody id="allLeaveTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="modal fade" id="commentModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Comments</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <textarea class="form-control" id="commentsInput" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitAction()">Submit</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = 'http://localhost:8080';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        let currentLeaveId;
        let currentAction;
        if (!token) window.location.href = 'index.html';
        document.getElementById('userName').textContent = user.fullName;
        async function loadPendingRequests() {
            const response = await fetch(`${API_URL}/api/manager/leave/pending`, {headers: {'Authorization': `Bearer ${token}`}});
            if (response.ok) {
                const requests = await response.json();
                document.getElementById('leaveTableBody').innerHTML = requests.map(r => `<tr><td>${r.employeeName}</td><td>${r.leaveType}</td><td>${r.startDate}</td><td>${r.endDate}</td><td>${r.duration} days</td><td>${r.reason || '-'}</td><td><button class="btn btn-sm btn-success" onclick="openCommentModal(${r.id}, 'approve')">Approve</button> <button class="btn btn-sm btn-danger" onclick="openCommentModal(${r.id}, 'reject')">Reject</button></td></tr>`).join('');
            }
        }
        async function loadAllRequests() {
            const response = await fetch(`${API_URL}/api/manager/leave/all`, {headers: {'Authorization': `Bearer ${token}`}});
            if (response.ok) {
                const requests = await response.json();
                document.getElementById('allLeaveTableBody').innerHTML = requests.map(r => `<tr><td>${r.employeeName}</td><td>${r.leaveType}</td><td>${r.startDate}</td><td>${r.endDate}</td><td>${r.duration}</td><td><span class="badge bg-${r.status === 'PENDING' ? 'warning' : r.status === 'APPROVED' ? 'success' : 'danger'}">${r.status}</span></td><td>${r.comments || '-'}</td></tr>`).join('');
            }
        }
        function openCommentModal(id, action) {
            currentLeaveId = id;
            currentAction = action;
            new bootstrap.Modal(document.getElementById('commentModal')).show();
        }
        async function submitAction() {
            const comments = document.getElementById('commentsInput').value;
            const url = `${API_URL}/api/manager/leave/${currentLeaveId}/${currentAction}`;
            const response = await fetch(url, {method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`}, body: JSON.stringify({comments})});
            if (response.ok) {
                alert('Leave request updated!');
                bootstrap.Modal.getInstance(document.getElementById('commentModal')).hide();
                loadPendingRequests();
                loadAllRequests();
            } else {
                alert('Error occurred');
            }
        }
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
        loadPendingRequests();
        loadAllRequests();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
