spring.application.name=Employee Leave Management System
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:elmsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=elmsSecretKeyForEmployeeLeaveManagementSystem2024SpringBootApplication
jwt.expiration=86400000

# Logging
logging.level.com.elms=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO